<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-sm-12">
                <div class="card p-4 shadow">
                    <h1 class="text-center mb-4">Adding two numbers </h1>
                    <form action="{% url 'calculator' %}" method="post">
                        {% csrf_token %}
                        <label for="">Enter the first number:</label>
                        <br><br>
                        <input type="number" name="num1" class="form-control" placeholder="Enter 1st number">
                        <br><br>
                        <label for="">Enter the second number:</label>
                        <br><br>
                        <input type="number" name="num2" class="form-control" placeholder="Enter 2nd number">
                        <br><br>
                        <button class="btn btn-primary w-100">Submit</button>
                        <br><br>
                        <label for="">Answer:</label>
                        <br><br>
                        <input type="number" class="form-control" value="{{answer}}">
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
